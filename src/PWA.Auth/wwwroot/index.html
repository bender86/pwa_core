    <meta charset="utf-8" />

<body>
    <script>
        // ─── Carousel ───────────────────────────────────────────────
        window.initializeCarousel = function (carouselId) {
            const el = document.getElementById(carouselId);
            if (el && typeof bootstrap !== 'undefined') {
                const existing = bootstrap.Carousel.getInstance(el);
                if (existing) existing.dispose();
                new bootstrap.Carousel(el, { interval: 5000, wrap: true, keyboard: true, touch: true });
            }
        };

        // ─── Push notifications ──────────────────────────────────────

        const VAPID_PUBLIC_KEY = 'BFZ43c7kBudUt4J6pno9JnCPzGfvy1axnPLXc44I5JId5939awG0Rr-CD3zPWpF51DpCRXOb6G34I0o0G-HX7io';

        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
            const raw = atob(base64);
            return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
        }

        // Called from Blazor to request permission and subscribe
        window.subscribeToPush = async function (apiBaseUrl, bearerToken) {
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
                return { success: false, error: 'Push not supported on this browser.' };
            }

            const permission = await Notification.requestPermission();
            if (permission !== 'granted') {
                return { success: false, error: 'Permission denied.' };
            }

            try {
                const reg = await navigator.serviceWorker.ready;
                const subscription = await reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
                });

                const key  = subscription.getKey('p256dh');
                const auth = subscription.getKey('auth');

                const dto = {
                    endpoint: subscription.endpoint,
                    p256DH:   btoa(String.fromCharCode(...new Uint8Array(key))),
                    auth:     btoa(String.fromCharCode(...new Uint8Array(auth)))
                };

                const response = await fetch(`${apiBaseUrl}/notifications/subscribe`, {
                    method:  'POST',
                    headers: {
                        'Content-Type':  'application/json',
                        'Authorization': `Bearer ${bearerToken}`
                    },
                    body: JSON.stringify(dto)
                });

                return { success: response.ok };
            } catch (err) {
                return { success: false, error: err.message };
            }
        };

        // Called from Blazor to check current permission status
        window.getNotificationPermission = function () {
            return Notification.permission; // 'granted' | 'denied' | 'default'
        };

        // ─── Service Worker registration ─────────────────────────────
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(reg => console.log('Service worker registered:', reg.scope))
                .catch(err => console.error('Service worker registration failed:', err));
        }
    </script>

    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

        An unhandled error has occurred.

        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
</body>
